# -----------------------------------------------------------------------------
# Site settings — Mobility Control Laboratory (MCLab), DGIST
# -----------------------------------------------------------------------------

title:                  blank                          # 좌상단 타이틀(공백/빈칸 유지 권장)
first_name:             Kanghyun
middle_name:
last_name:              Nam
email:                  khnam@dgist.ac.kr              # TODO: 실제 메일로 확인/수정
description:            >                              # 사이트 메타 설명(검색엔진 노출)
  Mobility Control Laboratory (MCLab) at DGIST —
  Vehicle Dynamics, Chassis Control, Motor Drives, and Physical-AI.

footer_text:            >
  © 2026 Mobility Control Laboratory, DGIST.
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme.

keywords:               vehicle dynamics, chassis control, motor control, PMSM, EMB, SbW, Physical-AI, DGIST, MCLab
lang:                   en                              # 기본 언어
icon:                   🚗                              # 브라우저 탭 이모지(원하면 변경)

# -----------------------------------------------------------------------------
# Theme — MCLab Navy / Brick
# -----------------------------------------------------------------------------
# al-folio는 _sass/_themes.scss 의 $purple-color, $red-color 등을 통해
# 색상을 정의합니다. NavyBlue / BrickRed 톤을 쓰시려면 _sass/_themes.scss 에서
#   $purple-color: #1f3a93;   // navy
#   $red-color:    #a52a2a;   // brick
# 정도로 수정하시면 MCLab Beamer 톤과 맞춰집니다.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# RSS / 사이트 URL (GitHub Pages 사용 시)
# -----------------------------------------------------------------------------
url:                    https://mclab-dgist.github.io   # TODO: 본인 GitHub 사용자명으로 변경
baseurl:                ""                              # 서브 경로 없으면 빈 문자열
last_updated:           true                            # 페이지 최종 수정일 표시

# -----------------------------------------------------------------------------
# 좌측 사이드바 / 프로필 카드 표시 항목
# -----------------------------------------------------------------------------
profile:
  align:                right
  image:                prof_pic.jpg                    # assets/img/prof_pic.jpg 에 사진 업로드
  image_circular:       false
  address:              >
    <p><strong>Mobility Control Laboratory (MCLab)</strong></p>
    <p>Department of Robotics and Mechatronics Engineering</p>
    <p>DGIST, 333 Techno Jungang-daero,</p>
    <p>Hyeonpung-eup, Dalseong-gun,</p>
    <p>Daegu 42988, Republic of Korea</p>

# -----------------------------------------------------------------------------
# 네비게이션 메뉴 활성화
# -----------------------------------------------------------------------------
about:                  # 좌측 "about" 페이지 (랜딩)
  enabled:              true
news:                   true            # 뉴스 페이지
selected_papers:        true            # 메인 화면 selected papers 섹션
social:                 true            # 메인 화면 소셜 아이콘
contact_note:           >
  학부생/대학원생/연구원 지원 문의는 메일로 보내주세요.

# -----------------------------------------------------------------------------
# 출판 관련
# -----------------------------------------------------------------------------
publications:           true
bibliography:           papers.bib
bib_search:             true            # 검색 박스 활성화
enable_publication_thumbnails: true
enable_publication_badges:
  altmetric:            true            # Altmetric 배지
  dimensions:           true            # Dimensions 인용수 배지
  google_scholar:       true            # Google Scholar 인용수
  inspire_hep:          false
filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview]

# -----------------------------------------------------------------------------
# 외부 프로필 링크 (사이드바 아이콘으로 노출됨)
# -----------------------------------------------------------------------------
github_username:        kanghyunnam      # TODO: 실제 ID로 수정/삭제
google_scholar_id:                       # TODO: 본인 Google Scholar ID 입력
orcid_id:                                # TODO: 0000-0002-XXXX-XXXX
linkedin_username:
researchgate_profile:
publons_id:
semanticscholar_id:
ieee_id:
work_url:               https://www.dgist.ac.kr        # 소속기관 링크

# -----------------------------------------------------------------------------
# 다크모드 / 사용성
# -----------------------------------------------------------------------------
enable_darkmode:        true
enable_progressbar:     true
enable_navbar_social:   false
enable_tooltips:        true

# -----------------------------------------------------------------------------
# 뉴스 / 공지
# -----------------------------------------------------------------------------
max_news:               5

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout:           post
    output:             true
    permalink:          /news/:path/
  projects:
    output:             true
    permalink:          /projects/:path/

# -----------------------------------------------------------------------------
# Markdown / kramdown
# -----------------------------------------------------------------------------
markdown:               kramdown
highlighter:            rouge
kramdown:
  input:                GFM
  syntax_highlighter:   rouge

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-tabs
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Optimize
# -----------------------------------------------------------------------------
optimize:
  enabled:              true
